repositories {
    google()
    mavenCentral()
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-android-extensions'
apply plugin: 'kotlin-kapt'

android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    compileSdkVersion project.ext.compileSdkVersion

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
		debug.java.srcDirs += 'src/debug/kotlin'
        release.java.srcDirs += 'src/release/kotlin'																				
        test.java.srcDirs += 'src/test/kotlin'
        androidTest.java.srcDirs += 'src/androidTest/kotlin'
    }
        signingConfigs {
            defaultSigning {
                if (project.hasProperty('storeFilePath')) {
                    storeFile file(storeFilePath)
                } else {
                    storeFile file('signing/debug.keystore')
                }

                if (project.hasProperty('storePasswordV')) {
                    storePassword storePasswordV
                } else {
                    storePassword 'android'
                }

                if (project.hasProperty('keyAliasV')) {
                    keyAlias keyAliasV
                } else {
                    keyAlias 'androiddebugkey'
                }

                if (project.hasProperty('keyPasswordV')) {
                    keyPassword keyPasswordV
                } else {
                    keyPassword 'android'
                }

                println '\n\n'
                println 'CONF: build storeFile is set to ' + storeFile
                println 'CONF: build storePassword is set to ' + storePassword
                println 'CONF: build keyAlias is set to ' + keyAlias
                println 'CONF: build keyPassword is set to ' + keyPassword
                println 'CONF: build versionName is set to ' + project.ext.versionName
                println 'CONF: build versionCode is set to ' + project.ext.versionCode
            }
    }

    defaultConfig {
        applicationId "com.harrikirik.rescheck"
        minSdkVersion project.ext.minSdkVersion
        targetSdkVersion project.ext.targetSdkVersion
        signingConfig signingConfigs.defaultSigning
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        versionName project.ext.versionName
        versionCode project.ext.versionCode

        println 'CONF: versionName is set to: ' + versionName
        println 'CONF: versionCode is set to: ' + versionCode
        println 'CONF: is a release build: ' + project.ext.isRelease
    }
    buildTypes {
        release {
            // Proguard is enabled by default
            // (Think about the logging lib before turning this off)
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.txt'
        }

        debug {
        }
    }
    lintOptions {
		// Workaround for a bug in Kotlin extension's Parcelize
        warning 'ParcelCreator'											 
        // In general we want to check for problems. Any time, all the time.
        checkReleaseBuilds true
        // And fail the build if we have errors
        abortOnError true

        // Level depends on the type of the job
        project.ext.isRelease ? error("MissingTranslation") : warning("MissingTranslation")
        // Error level things
        /// Hardcoded text should not exist or should have case by case exceptions
        error "HardcodedText"
        // Warning level things
        warning "ImpliedQuantity"
        // Retrofit uses Okio and that generates this warning
        warning "InvalidPackage"
    }
	 android.applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.outputFileName = "${project.name}-${variant.name}-${variant.versionName}.apk"
        }
    }							 
}

androidExtensions {
    experimental = true
}																							
def GROUP_BUILD_TASKS = 'Build'
task buildAllDebug(dependsOn: ['clean', 'build'])
buildAllDebug.group = GROUP_BUILD_TASKS
buildAllDebug.description = "Build the debug version"

task buildAllRelease(dependsOn: ['buildAllDebug'])
buildAllRelease.group = GROUP_BUILD_TASKS
buildAllRelease.description = "Build the release version"

build.mustRunAfter clean

androidExtensions {
    experimental = true
}				   		  
dependencies {
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$junitAndroidVersion"
	androidTestImplementation "androidx.test.espresso:espresso-core:$espressoVersion"

    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlinVersion"
    implementation project(':lib_mvp')
    implementation "androidx.appcompat:appcompat:$appcompatVersion"
    implementation "com.android.support:design:$appcompatVersion"
    implementation "com.jakewharton.timber:timber:$timberVersion"
    implementation "io.reactivex.rxjava2:rxjava:$rxJavaVersion"
    implementation "io.reactivex.rxjava2:rxandroid:$rxAndroidVersion"														 
}
