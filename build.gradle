buildscript {
    ext.pluginVersion = '3.2.1'
    ext.kotlinVersion = '1.3.30'
	ext.ktlintGradleVersion = '4.1.0'								 
    repositories {
		google()
        jcenter()
		maven {
            url "https://plugins.gradle.org/m2/"
        }	   
    }
	
    dependencies {
        classpath "com.android.tools.build:gradle:$pluginVersion"
		classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
		classpath "gradle.plugin.org.jlleitschuh.gradle:ktlint-gradle:$ktlintGradleVersion"						   
    }
}

subprojects {
    apply plugin: 'org.jlleitschuh.gradle.ktlint'

    ktlint {
        android = true
        outputToConsole = true
        reporters = ["PLAIN", "CHECKSTYLE"]
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

static def getDate() {
    def date = new Date()
    def formattedDate = date.format('yyyy.MM.dd')
    return formattedDate
}


allprojects {
    ext {
        // SDK versions
        compileSdkVersion = 28
        minSdkVersion = 14
        targetSdkVersion = 28
        versionName = "0.0.1"
        versionCode = 1
        isRelease = false

        // Library versions
		junitVersion = '4.12'
        junitAndroidVersion = '1.1.0'
        testRunnerVersion = '1.0.2'
		espressoVersion = '3.1.0'
        appcompatVersion = '1.0.0'
		timberVersion = '4.7.1'
        scrollsVersion = '2.0.1-release'
        rxJavaVersion = '2.1.16'
        rxAndroidVersion = '2.1.1'
        mockitoVersion = '2.19.0'
        mockitoKotlinVersion = '2.0.0-RC1'		
    }


    buildscript {
        project.group = "mobi"
        // Yes yes, I am cheating here.
        project.ext.isRelease = project.gradle.startParameter.taskNames.contains("buildAllRelease")
        
        String suppliedBuildNumber = "$System.env.BUILD_NUMBER"
        // VersionName
        if (suppliedBuildNumber == null || suppliedBuildNumber.equals("") || suppliedBuildNumber.equals("null")) {
            project.ext.versionName = getDate() + (isRelease ? ".r" : ".d") + "1"
        } else {
            project.ext.versionName = getDate() + (isRelease ? ".r" : ".d") + suppliedBuildNumber
        }
        // This is the synonym
        project.version = project.ext.versionName
        
        // VersionCode
        if (suppliedBuildNumber == null || suppliedBuildNumber.equals("") || suppliedBuildNumber.equals("null")) {
            project.ext.versionCode = 1
        } else {
            project.ext.versionCode = Integer.valueOf(suppliedBuildNumber)
        }
    }
    repositories {
		google()
        jcenter()
    }
}
